<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 520" width="760" height="520" role="img" aria-labelledby="title desc">
  <title id="title">Michal Lemiec portfolio bento</title>
  <desc id="desc">A compact portfolio summary with intro, tech stack, projects, contact, and focus areas.</desc>
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .card { fill: #161b22; stroke: #30363d; stroke-width: 1.25; }
      .eyebrow { fill: #58a6ff; font: 600 13px system-ui, -apple-system, Segoe UI, sans-serif; letter-spacing: .08em; text-transform: uppercase; }
      .title { fill: #f0f6fc; font: 700 28px system-ui, -apple-system, Segoe UI, sans-serif; }
      .section { fill: #c9d1d9; font: 700 18px system-ui, -apple-system, Segoe UI, sans-serif; }
      .text { fill: #8b949e; font: 16px system-ui, -apple-system, Segoe UI, sans-serif; }
      .small { fill: #8b949e; font: 14px system-ui, -apple-system, Segoe UI, sans-serif; }
      .link { fill: #58a6ff; font: 700 15px system-ui, -apple-system, Segoe UI, sans-serif; }
      .pill { fill: #0d1117; stroke: #30363d; stroke-width: 1; }
      .dot { fill: #58a6ff; }
    </style>
  </defs>

  <rect class="bg" width="760" height="520" rx="24"/>

  <rect class="card" x="24" y="24" width="456" height="196" rx="18"/>
  <text class="eyebrow" x="52" y="66">Full-stack engineer</text>
  <text class="title" x="52" y="104">Hi, I'm Michal.</text>
  <text class="text" x="52" y="142">I build practical tools with .NET, TypeScript,</text>
  <text class="text" x="52" y="170">machine learning, and computer vision.</text>

  <rect class="card" x="504" y="24" width="232" height="196" rx="18"/>
  <text class="section" x="532" y="66">Contact</text>
  <text class="text" x="532" y="104">LinkedIn</text>
  <text class="link" x="532" y="137">@mlemiec -></text>

  <rect class="card" x="24" y="244" width="232" height="252" rx="18"/>
  <text class="section" x="52" y="286">Tech</text>
  <rect class="pill" x="52" y="313" width="132" height="32" rx="16"/>
  <text class="small" x="70" y="335">.NET / C#</text>
  <rect class="pill" x="52" y="357" width="132" height="32" rx="16"/>
  <text class="small" x="70" y="379">TypeScript</text>
  <rect class="pill" x="52" y="401" width="124" height="32" rx="16"/>
  <text class="small" x="70" y="423">FastAPI</text>
  <rect class="pill" x="52" y="445" width="148" height="32" rx="16"/>
  <text class="small" x="70" y="467">LlamaIndex</text>

  <rect class="card" x="280" y="244" width="456" height="116" rx="18"/>
  <text class="section" x="308" y="286">Focus</text>
  <circle class="dot" cx="310" cy="318" r="3"/>
  <text class="text" x="324" y="324">APIs, front-ends, Azure CI/CD, and RAG systems.</text>

  <rect class="card" x="280" y="384" width="216" height="112" rx="18"/>
  <text class="section" x="308" y="426">Secret Pipe</text>
  <text class="small" x="308" y="456">Secure dead-drop for</text>
  <text class="small" x="308" y="478">passwords and APIs.</text>

  <rect class="card" x="520" y="384" width="216" height="112" rx="18"/>
  <text class="section" x="548" y="426">NANA</text>
  <text class="small" x="548" y="456">Note-taking assistant</text>
  <text class="small" x="548" y="478">for markdown vaults.</text>
</svg>
