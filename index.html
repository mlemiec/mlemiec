<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bento Portfolio</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0d1117;
      --text: #c9d1d9;
      --muted: #8b949e;
      --link: #58a6ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
    }

    main {
      width: min(100%, 820px);
      padding: 32px 20px;
      text-align: center;
    }

    img {
      display: block;
      width: 100%;
      height: auto;
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 18px;
      margin-top: 18px;
      color: var(--muted);
      font-size: 15px;
    }

    a {
      color: var(--link);
      font-weight: 700;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main>
    <img src="bento.svg" alt="Michal Lemiec portfolio bento">
    <nav aria-label="Profile links">
      <a href="https://linkedin.com/in/mlemiec">LinkedIn</a>
      <span aria-hidden="true">/</span>
      <a href="https://secret-pipe.pages.dev">Secret Pipe</a>
      <span aria-hidden="true">/</span>
      <a href="https://pypi.org/project/nana-wiki/">NANA</a>
    </nav>
  </main>
</body>
</html>
