<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bento Portfolio</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0d1117;
      --text: #c9d1d9;
      --muted: #8b949e;
      --link: #58a6ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
    }

    main {
      width: min(100%, 820px);
      padding: 32px 20px;
    }

    .bento-grid {
      display: grid;
      grid-template-columns: repeat(3, 240px);
      grid-auto-rows: 170px;
      gap: 12px;
      justify-content: center;
    }

    .span-2 {
      grid-column: span 2;
    }

    .span-3 {
      grid-column: span 3;
    }

    .row-2 {
      grid-row: span 2;
    }

    img {
      display: block;
      width: 100%;
      height: 100%;
    }

    a {
      display: block;
      height: 100%;
    }

    @media (max-width: 780px) {
      .bento-grid {
        grid-template-columns: minmax(0, 1fr);
        grid-auto-rows: auto;
      }

      .span-2,
      .span-3,
      .row-2 {
        grid-column: auto;
        grid-row: auto;
      }

      img {
        height: auto;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="bento-grid">
      <img class="span-2" src="bento-intro.svg" alt="Hi, I'm Michal">
      <a href="https://linkedin.com/in/mlemiec"><img src="bento-contact.svg" alt="Contact"></a>
      <img class="row-2" src="bento-tech.svg" alt="Tech stack">
      <img class="span-2" src="bento-hobbies.svg" alt="Focus">
      <a href="https://secret-pipe.pages.dev"><img src="bento-secret-pipe.svg" alt="Secret Pipe"></a>
      <a href="https://pypi.org/project/nana-wiki/"><img src="bento-nana.svg" alt="NANA"></a>
      <img class="span-3" src="https://streak-stats.demolab.com?user=mlemiec&amp;theme=tokyonight&amp;hide_border=true&amp;background=161B22&amp;stroke=30363D&amp;ring=58A6FF&amp;fire=58A6FF&amp;currStreakNum=F0F6FC&amp;currStreakLabel=8B949E&amp;dates=8B949E&amp;hide_total_contributions=true&amp;hide_longest_streak=true&amp;card_width=760" alt="Current GitHub commit streak">
    </div>
  </main>
</body>
</html>
