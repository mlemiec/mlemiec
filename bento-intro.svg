<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 170" width="500" height="170">
  <style>
    .card { fill: #161b22; stroke: #30363d; stroke-width: 2; }
    .title { fill: #c9d1d9; font-family: system-ui, -apple-system, sans-serif; font-weight: bold; font-size: 20px; }
    .text { fill: #8b949e; font-family: system-ui, -apple-system, sans-serif; font-size: 15px; }
    .highlight { fill: #58a6ff; font-weight: 600; }
    .icon { font-size: 24px; }
  </style>
  <rect class="card" x="1" y="1" width="498" height="168" rx="15" />
  <text class="title icon" x="30" y="45">👋</text>
  <text class="title" x="65" y="45">Hi, I'm Michal!</text>
  <text class="text" x="30" y="85">Full-stack engineer focused on <tspan class="highlight">.NET</tspan> and <tspan class="highlight">TypeScript</tspan>,</text>
  <text class="text" x="30" y="110">with a passion for machine learning and computer vision.</text>
  <text class="text" x="30" y="135">Always exploring new technologies to build impactful tools!</text>
</svg>